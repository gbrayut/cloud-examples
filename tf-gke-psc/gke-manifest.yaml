# GKE Gateway manifest for gke-l7-rilb (Regional Internal Load Balancer)
# for use with L7PSC https://docs.cloud.google.com/vpc/docs/configure-private-service-connect-producer
# Also requires the base-whereami-spread deployments:
# kubectl apply -f https://raw.githubusercontent.com/gbrayut/cloud-examples/refs/heads/main/gke-gclb-misc/base-whereami-spread.yaml
kind: Gateway
apiVersion: gateway.networking.k8s.io/v1beta1
metadata:
  name: whereami-rilb
  namespace: test-gclb
  #annotations:
  #  # For global ALB use a certificate map
  #  networking.gke.io/certmap: gke-gateway-map
spec:
  gatewayClassName: gke-l7-rilb # L7PSC only supports gke-l7-rilb and gke-l7-cross-regional-internal-managed-mc targets
  listeners:
  - name: http
    protocol: HTTP
    port: 80
  
  # Second listener will create a similar Forwarding Rule but distinct port_range
  - name: http-8080
    protocol: HTTP
    port: 8080

  # https://docs.cloud.google.com/kubernetes-engine/docs/how-to/secure-gateway
  #- name: https
  #  protocol: HTTPS
  #  port: 443
  #  tls:
  #    mode: Terminate    # Must terminate TLS on ALBs
  #    options:
  #      # For Regional ALB use a Google or Self Managed certificates (don't support certificate maps)
  #      networking.gke.io/cert-manager-certs: "uc1-wildcard"    # Can specify multiple comma separted certs for SNI based SAN matching
  #      # For Global ALB just use networking.gke.io/certmap annotation above

  #addresses:
  #- type: NamedAddress
  #  value: whereami-static-ip
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: whereami-route-rilb
  namespace: test-gclb
spec:
  parentRefs:
  - name: whereami-rilb
  #hostnames:
  #- "*.example.com"
  rules:    # More examples at https://gateway-api.sigs.k8s.io/reference/api-types/httproute/#rules

  # Send everything to gke-gclb-misc/base-whereami-spread.yaml example deployment
  - matches:
    - path:
        value: /
    backendRefs:
    - name: whereami-spread
      port: 80

