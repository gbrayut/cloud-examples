# gcsfuse CSI driver and StatefulSet with PVC https://docs.cloud.google.com/kubernetes-engine/docs/how-to/cloud-storage-fuse-csi-driver-pv
apiVersion: v1
kind: PersistentVolume  # https://kubernetes.io/docs/concepts/storage/persistent-volumes/#persistent-volumes
metadata:
  name: stateful-whereami-pv
  # namespace: test-gcs   # PV is a cluster level resource, not namespaced
spec:
  accessModes:
  - ReadWriteMany
  capacity:
    storage: 10Gi # Must match or exceed the storage requested in the volumeClaimTemplate, but GCS is effectively unlimited
  storageClassName: ""  # or something random like gcsfuse-testing (doesn't have to actually exist for dynamically provisioned volumes)
  mountOptions:
    - implicit-dirs     # required, see more at https://docs.cloud.google.com/kubernetes-engine/docs/how-to/cloud-storage-fuse-csi-driver-perf#persistent-volume
    # Set mount permissions to appuser uid/gid from https://github.com/GoogleCloudPlatform/kubernetes-engine-samples/blob/main/quickstarts/whereami/Dockerfile#L20-L21
    # Without this trying to write files to GCS from inside the container will fail "Permission denied" due to being mounted as root:root
    - uid=100           # Force files to look like they are owned by correct UID
    - gid=101           # Force files to look like they are owned by correct UID
    # Full list at https://docs.cloud.google.com/storage/docs/cloud-storage-fuse/cli-options
  csi:
    driver: gcsfuse.csi.storage.gke.io
    # Replace this with your Google Cloud Storage bucket name (without the gs:// prefix)
    volumeHandle: "gregbray-testing"
    readOnly: false
  claimRef:   # Not strictly requried, but can specify which PVC is expected to claim this volume
    name: stateful-whereami-pvc
    namespace: test-gcs
---
# This PVC will be used by all replica in the stateful set. This works better than volumeClaimTemplates which creates unique PVC for each pod (but PV only allow one PVC to bind at a time)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stateful-whereami-pvc
  namespace: test-gcs
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: "" # or whatever specified above. Dont need to use this if explicitly specify volumeName and claimRef
  volumeName: stateful-whereami-pv
---
# Example here uses statfulset, but deployments and explicit PVC resources would also work
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stateful-whereami
  namespace: test-gcs
  labels:
    app: whereami
spec:
  serviceName: "whereami"   # This must be the headless service to have the <podname>.<service>.<namespace>.svc.cluster.local (or cluster suffix) records created
  replicas: 3
  selector:
    matchLabels:
      app: whereami
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 3   # Default is 1, this just makes updates faster when testing (don't use for production)
  #persistentVolumeClaimRetentionPolicy:
  #  whenDeleted: Delete   # Make sure templated PVCs are deleted if statefulset is removed
  #  whenScaled: Retain    # If sts replicas are scaled down, fine to leave PVC as is
  template:
    metadata:
      annotations:
        gke-gcsfuse/volumes: "true"     # Required when using gcsfuse csi driver
      labels:
        app: whereami
    spec:
      terminationGracePeriodSeconds: 60     # allow more time to flush files on exit
      serviceAccountName: test-gcs-access   # Must have WIF with roles/storage.objectViewer or objectUser on GCS Bucket or project
      containers:
      # https://github.com/GoogleCloudPlatform/kubernetes-engine-samples/tree/main/quickstarts/whereami
      - name: whereami
        image: us-docker.pkg.dev/google-samples/containers/gke/whereami:v1.2.27
        ports:
        - containerPort: 8080
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: ECHO_HEADERS
          value: "True"
        volumeMounts:
        - name: gcs-pvc
          mountPath: /data
          readOnly: false
        # Can also use subPath or subPathExpr to only mount a subdirectory from inside the bucket https://kubernetes.io/docs/concepts/storage/volumes/#using-subpath
        - name: gcs-pvc
          mountPath: /data-this-pod
          subPathExpr: $(POD_NAMESPACE)/$(POD_NAME)   # These must match the names defined in env above
          readOnly: false
      # Instead of volumeClaimTemplates use the static PVC from above on all pods
      volumes:
      - name: gcs-pvc
        persistentVolumeClaim:
          claimName: stateful-whereami-pvc
          readOnly: false

  # This only works for replica count of 1. If multiple you should use a static PVC resource and volumes section
  #volumeClaimTemplates:
  #- metadata:
  #    name: gcs-pvc   # Expands to gcs-pvc-stateful-whereami-0 -1 and -2
  #  spec:
  #    # GCS supports multiple pods reading and writing simultaneously
  #    accessModes: [ "ReadWriteMany" ]
  #    # This ensures the claim looks for a PV specifically created for GCS
  #    storageClassName: "gcsfuse-testing"
  #    volumeName: stateful-whereami-pv
  #    resources:
  #      requests:
  #        # Kubernetes requires a size request, even though GCS buckets are virtually limitless
  #        storage: 10Gi
---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "whereami"
  namespace: "test-gcs"
spec:
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    appProtocol: http
    name: http
  selector:
    app: "whereami"
  type: "ClusterIP"
  clusterIP: "None" # headless service for stable network id https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#stable-network-id
---
